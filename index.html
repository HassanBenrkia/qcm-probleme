<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Résolution des Problèmes</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 0; }
    .container { max-width: 800px; margin: 40px auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; }
    .top-bar { display:flex; justify-content: space-between; align-items:center; margin-bottom: 10px; }
    .question { margin-bottom: 20px; }
    .answers label { display: block; margin: 5px 0; cursor: pointer; }
    button { padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .result { text-align: center; font-size: 20px; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <h1 id="title">QCM - Résolution des Problèmes</h1>
    <button onclick="toggleLang()" id="langBtn">AR</button>
  </div>

  <div id="quiz"></div>

  <button onclick="submitQuiz()" id="submitBtn">Valider</button>

  <div class="result" id="result"></div>
</div>

<script>
let lang = 'fr';

const data = {
  fr: {
    title: "QCM - Résolution des Problèmes",
    submit: "Valider",
    result: "Votre score :",
    questions: [
      { q: "Quelle est la première étape de la résolution des problèmes ?", a: ["Proposer des solutions", "Identifier le problème", "Appliquer la solution"], c: 1 },
      { q: "Que fait-on après avoir identifié le problème ?", a: ["Analyser les causes", "Choisir une solution", "Ignorer le problème"], c: 0 },
      { q: "Pourquoi proposer plusieurs solutions ?", a: ["Pour gagner du temps", "Pour choisir la meilleure", "Pour compliquer"], c: 1 },
      { q: "Quelle méthode utilise plusieurs points de vue ?", a: ["Méthode Agile", "6 chapeaux de Bono", "Waterfall"], c: 1 },
      { q: "Le chapeau rouge représente :", a: ["Les émotions", "Les faits", "Les risques"], c: 0 },
      { q: "Quel est l'objectif principal de l'analyse des causes ?", a: ["Comprendre le problème", "Ignorer le problème", "Trouver des excuses"], c: 0 },
      { q: "Que fait-on après avoir choisi la meilleure solution ?", a: ["Appliquer la solution", "Réfléchir encore", "Partager avec tout le monde"], c: 0 },
      { q: "Que signifie le chapeau blanc dans la méthode de Bono ?", a: ["Émotions", "Faits et données", "Intuition"], c: 1 },
      { q: "Pourquoi est-il important de considérer plusieurs solutions ?", a: ["Pour éviter les erreurs", "Pour perdre du temps", "Pour compliquer"], c: 0 },
      { q: "Que fait-on après avoir appliqué une solution ?", a: ["Évaluer les résultats", "Oublier le problème", "Recommencer sans analyser"], c: 0 }
    ]
  },
  ar: {
    title: "اختبار حل المشكلات",
    submit: "تأكيد",
    result: "النتيجة:",
    questions: [
      { q: "ما هي أول خطوة في حل المشكلات؟", a: ["اقتراح الحلول", "تحديد المشكلة", "تطبيق الحل"], c: 1 },
      { q: "ماذا نفعل بعد تحديد المشكلة؟", a: ["تحليل الأسباب", "اختيار الحل", "تجاهل المشكلة"], c: 0 },
      { q: "لماذا نقترح عدة حلول؟", a: ["لتوفير الوقت", "لاختيار الأفضل", "لتعقيد الأمور"], c: 1 },
      { q: "أي طريقة تعتمد على وجهات نظر متعددة؟", a: ["أجايل", "القبعات الست", "ووترفول"], c: 1 },
      { q: "القبعة الحمراء تمثل:", a: ["المشاعر", "الحقائق", "المخاطر"], c: 0 },
      { q: "ما الهدف الرئيسي من تحليل الأسباب؟", a: ["فهم المشكلة", "تجاهل المشكلة", "إيجاد الأعذار"], c: 0 },
      { q: "ماذا نفعل بعد اختيار الحل الأفضل؟", a: ["تطبيق الحل", "التفكير مجدداً", "مشاركته مع الجميع"], c: 0 },
      { q: "ماذا يعني القبعة البيضاء في طريقة بونو؟", a: ["المشاعر", "الحقائق والبيانات", "الحدس"], c: 1 },
      { q: "لماذا من المهم النظر في عدة حلول؟", a: ["لتجنب الأخطاء", "لإضاعة الوقت", "لتعقيد الأمور"], c: 0 },
      { q: "ماذا نفعل بعد تطبيق الحل؟", a: ["تقييم النتائج", "نسيان المشكلة", "إعادة المحاولة دون تحليل"], c: 0 }
    ]
  }
};

function loadQuiz() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";

  data[lang].questions.forEach((q, index) => {
    const div = document.createElement("div");
    div.classList.add("question");

    div.innerHTML = `
      <p><strong>${index + 1}. ${q.q}</strong></p>
      <div class="answers">
        ${q.a.map((a, i) => `
          <label>
            <input type="radio" name="q${index}" value="${i}"> ${a}
          </label>
        `).join("")}
      </div>
    `;

    quiz.appendChild(div);
  });

  document.getElementById("title").innerText = data[lang].title;
  document.getElementById("submitBtn").innerText = data[lang].submit;
  document.getElementById("langBtn").innerText = lang === 'fr' ? 'AR' : 'FR';
}

function submitQuiz() {
  let score = 0;

  data[lang].questions.forEach((q, index) => {
    const selected = document.querySelector(`input[name="q${index}"]:checked`);
    if (selected) {
      if (parseInt(selected.value) === q.c) {
        score++;
      }
    } else {
      alert(lang === 'fr' ? `Vous n'avez pas répondu à la question ${index + 1}` : `لم تجب على السؤال ${index + 1}`);
      return;
    }
  });

  document.getElementById("result").innerText = `${data[lang].result} ${score} / ${data[lang].questions.length}`;
}

function toggleLang() {
  lang = lang === 'fr' ? 'ar' : 'fr';
  loadQuiz();
  document.getElementById("result").innerText = "";
}

loadQuiz();
</script>

</body>
</html>
