<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>QCM Interactif</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(120deg, #4facfe, #00f2fe);
    font-family: Arial, sans-serif;
}

.container {
    background: white;
    border-radius: 15px;
    padding: 30px;
    margin-top: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #007bff;
    font-weight: bold;
}

.question {
    background: #f1f8ff;
    border-left: 5px solid #007bff;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.question:hover {
    background: #e6f0ff;
}

.answers label {
    display: block;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.answers label:hover {
    background: #d6eaff;
}

input[type="radio"] {
    margin-right: 10px;
}

.points {
    color: #ff9800;
    font-weight: bold;
    margin-left: 5px;
}

button {
    width: 100%;
    font-size: 18px;
}

#result {
    margin-top: 25px;
    font-size: 24px;
    text-align: center;
    font-weight: bold;
    color: #28a745;
}
</style>
</head>

<body>

<div class="container">
    <h1>📝 QCM Interactif</h1>

    <div class="alert alert-primary">
        <strong>📌 Instructions :</strong>
        <ul>
            <li>Choisis une seule réponse pour chaque question.</li>
            <li>Chaque réponse donne 1 à 4 points.</li>
            <li>À la fin, clique sur le bouton pour voir ton score.</li>
        </ul>
    </div>

    <form id="quizForm"></form>

    <button class="btn btn-success mt-3" onclick="calculerScore()">🎯 Voir le résultat</button>

    <div id="result"></div>
</div>

<script>
const questions = [
{
q: "1. Quand tu commences un projet :",
answers: [
{ text: "A) Je cherche toutes les informations et les faits.", value: 4 },
{ text: "B) Je pense à mes sentiments et à mon intuition.", value: 3 },
{ text: "C) Je pense aux problèmes possibles.", value: 1 },
{ text: "D) Je cherche des idées nouvelles.", value: 2 }
]
},
{
q: "2. Quand il y a un problème dans l’équipe :",
answers: [
{ text: "A) J’analyse la situation avec des faits.", value: 4 },
{ text: "B) J’écoute les émotions des autres.", value: 3 },
{ text: "C) Je fais attention aux risques.", value: 1 },
{ text: "D) Je propose des solutions créatives.", value: 2 }
]
},
{
q: "3. Pour organiser une réunion :",
answers: [
{ text: "A) Je prépare un plan clair et organisé.", value: 4 },
{ text: "B) Je pense à l’ambiance et aux personnes.", value: 3 },
{ text: "C) J’essaie d’éviter les problèmes.", value: 1 },
{ text: "D) Je propose des idées nouvelles.", value: 2 }
]
},
{
q: "4. Quand tu dois choisir entre deux options :",
answers: [
{ text: "A) Je compare les informations et les faits.", value: 4 },
{ text: "B) Je choisis selon mon sentiment.", value: 3 },
{ text: "C) Je regarde les risques.", value: 1 },
{ text: "D) Je pense aux avantages.", value: 2 }
]
},
{
q: "5. Pour motiver ton équipe :",
answers: [
{ text: "A) Je donne des informations claires.", value: 3 },
{ text: "B) J’encourage les émotions positives.", value: 4 },
{ text: "C) Je parle des problèmes possibles.", value: 1 },
{ text: "D) Je propose des idées nouvelles.", value: 2 }
]
},
{
q: "6. Quand tu planifies un événement :",
answers: [
{ text: "A) Je note tous les détails importants.", value: 4 },
{ text: "B) Je pense à mon intuition.", value: 3 },
{ text: "C) Je prévois les problèmes.", value: 1 },
{ text: "D) Je cherche des idées originales.", value: 2 }
]
},
{
q: "7. Si quelqu’un propose une idée :",
answers: [
{ text: "A) Je vérifie si l’idée est basée sur des faits.", value: 4 },
{ text: "B) Je regarde si j’aime cette idée.", value: 3 },
{ text: "C) Je pense aux risques.", value: 1 },
{ text: "D) Je développe l’idée avec créativité.", value: 2 }
]
},
{
q: "8. Quand tu travailles en équipe :",
answers: [
{ text: "A) Je suis un plan organisé.", value: 4 },
{ text: "B) Je fais attention aux sentiments des autres.", value: 3 },
{ text: "C) Je fais attention aux erreurs possibles.", value: 1 },
{ text: "D) Je cherche des idées nouvelles.", value: 2 }
]
},
{
q: "9. Quand tu présentes un projet :",
answers: [
{ text: "A) Je montre les faits et les résultats.", value: 4 },
{ text: "B) Je parle avec émotion.", value: 3 },
{ text: "C) Je parle des problèmes possibles.", value: 1 },
{ text: "D) Je montre les points positifs.", value: 2 }
]
},
{
q: "10. Pour résoudre un conflit :",
answers: [
{ text: "A) J’analyse la situation calmement.", value: 4 },
{ text: "B) J’écoute les émotions des personnes.", value: 3 },
{ text: "C) Je pense aux conséquences négatives.", value: 1 },
{ text: "D) Je propose des solutions créatives.", value: 2 }
]
}
];

const form = document.getElementById("quizForm");

questions.forEach((question, index) => {
    const div = document.createElement("div");
    div.classList.add("question");

    let html = `<h5>${question.q}</h5><div class="answers">`;

    question.answers.forEach((answer) => {
        html += `
        <label>
            <input type="radio" name="q${index}" value="${answer.value}">
            ${answer.text} <span class="points">(${answer.value}pnt)</span>
        </label>`;
    });

    html += "</div>";
    div.innerHTML = html;
    form.appendChild(div);
});

function calculerScore() {
    let score = 0;

    questions.forEach((q, index) => {
        const selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected) {
            score += parseInt(selected.value);
        }
    });

    document.getElementById("result").innerHTML =
        "🎉 Ton score est : " + score + " points";
}
</script>

</body>
</html>
